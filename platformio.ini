; ==========================================================
; 两套 env,按手上的板子选:
;   pio run -e m5stickc-plus    → 原始 M5StickC Plus   (ESP32 + AXP192,BM8563 RTC,SH200Q)
;   pio run -e m5stack-sticks3  → M5 StickS3           (ESP32-S3 + M5PM1 PMIC,ST7789P3,BMI270)
;
; 默认编 StickS3(用户当前硬件)。
; 两套都用 m5stack/M5Unified,它运行时探测板型用对应驱动。
; ==========================================================

[platformio]
default_envs = m5stack-sticks3

; ---------------------------------------------------------
; 原始 M5StickC Plus
; ---------------------------------------------------------
[env:m5stickc-plus]
platform = espressif32
board = m5stick-c
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = no_ota.csv
board_build.f_cpu = 160000000L
build_flags =
    -DCORE_DEBUG_LEVEL=0
build_src_filter = +<*> +<buddies/>
lib_deps =
    m5stack/M5Unified
    bitbank2/AnimatedGIF @ ^2.1.1
    bblanchon/ArduinoJson @ ^7.0.0

; ---------------------------------------------------------
; M5 StickS3(ESP32-S3-PICO-1-N8R8,8MB Flash / 8MB PSRAM)
; 配置来源:https://docs.m5stack.com/en/core/StickS3
; ---------------------------------------------------------
[env:m5stack-sticks3]
platform = espressif32@6.12.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = no_ota.csv
board_build.arduino.memory_type = qio_opi
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DTARGET_STICKS3
    -mfix-esp32-psram-cache-issue
build_src_filter = +<*> +<buddies/>
lib_deps =
    m5stack/M5Unified
    https://github.com/m5stack/M5PM1
    bitbank2/AnimatedGIF @ ^2.1.1
    bblanchon/ArduinoJson @ ^7.0.0
